# ─── Simple Setup (true / false only) ───────────────────────────────────────
# true = live Basler camera, false = load images from Input/ (directory mode)
USE_CAMERA = true

# Set to true to drive real GPIO pins; false = log-only, safe without hardware
IO = false

# Print extra debug logs and save annotated image every cycle
DEBUG = true

# Debug-only: flash lighting per loaded image in directory mode, mocking a real
# capture flash. Requires DEBUG = true and USE_CAMERA = false.
LIGHTING_TEST = true

# Save cropped cells to Dataset/ for model retraining
COLLECT_DATASET = false

# Show cell grid labels on annotated images
RESULT_OVERLAY = true


# ─── System ──────────────────────────────────────────────────────────────────
# Serial port for Cell-con lot number reader
CELLCON_PORT = "/dev/ttyUSB0"


# ─── Paths ───────────────────────────────────────────────────────────────────
# Folder containing images when USE_CAMERA = false
DIR_INPUT = "Capture/"

# Root output folder for raw and annotated results
OUT_DIR = "Output/"

# Folder where daily CSV log files are written
LOG_DIR = "logs"

# Folder where collected dataset crops are saved
DATA_DIR = "Dataset"

# Dataset subfolder used when COLLECT_DATASET = true
DATA_SPLIT = "train"

# OpenVINO cell classifier model (.xml)
MODEL_PATH = "Text_cls-2/best_openvino_model/best.xml"


# ─── Classifier / Inspection ─────────────────────────────────────────────────
# Text-class probability must exceed this to call a cell PASS  (sole active threshold)
TEXT_MIN_CONF = 0.80

# Number of inference passes per cell; averaged before applying TEXT_MIN_CONF (1 = off, 3 recommended)
CLS_N_PASSES = 3

# If averaged text_prob falls in [CLS_UNCERTAIN_THR, TEXT_MIN_CONF], a debug line is printed
CLS_UNCERTAIN_THR = 0.50

# Missing cells below this count → PASS (suspect); at or above → FAIL (suspect)
TEXT_NG_THRESHOLD = 2

# Pixel std-dev below this forces NoText (blank cell); 0 = disabled
BLANK_CELL_STD_THR = 0.0

# Non-maximum suppression IoU threshold (detection post-processing)
NMS_IOU_THR = 0.45

# weight for second-attempt confidence (first-attempt weight = 1.0 − RETRY_W2)
RETRY_W2       = 0.7

# weighted score threshold to call a retried cell PASS
RETRY_PASS_THR = 0.90

# Minimum blob area ratio for template binary map (0.0 = off).
# Blobs smaller than BLOB_MIN_RATIO × largest_blob_area are removed.
# Set to 0.2 to eliminate IC-corner reflections from the pin-patch template.
BLOB_MIN_RATIO = 0.0

# Minimum template match score for IC_A locate; below this logs a warning (0.0–1.0).
TEMPLATE_MATCH_THR = 0.6

# Minimum match score to accept IC_B during auto-detection at setup time (0.0–1.0).
TEMPLATE_FIND_CONF_THR = 0.4

# ±px around the expected pin-patch position to search for IC_A (locate_ic).
# X stays tight (mechanical placement is stable in X; IC_B sits ~476px away —
# too large a margin risks locking onto it instead). Y needs to be much larger
# to cover real placement-tolerance drift (measured -196..+144px on this fixture).
TEMPLATE_SEARCH_MARGIN_X = 80
TEMPLATE_SEARCH_MARGIN_Y = 200

# ─── Grid Geometry ───────────────────────────────────────────────────────────
# Shrink IC bounding rect before splitting into cells (centred, e.g. 0.95 = 5% trim)
CELL_SHRINK = 0.95

# Expand each individual cell crop after splitting (centred overlap)
CELL_EXPAND = 1.00

# Gap between left and right IC columns, as % of IC width
COL_GAP_PCT = 40.0

# Dead-band at top of IC before row 1, as % of IC height
GRID_MARGIN_TOP = 5.0

# Dead-band at bottom of IC after row 3, as % of IC height
GRID_MARGIN_BOT = 10.0


# ─── Camera ──────────────────────────────────────────────────────────────────
# Resize directory-mode images to this size before inspection (0 = native, no resize)
IMAGE_W = 0
IMAGE_H = 0

# Basler camera serial number filter; leave blank to use first camera found
CAMERA_SERIAL = "24621497"

# Camera exposure time in microseconds
EXPOSURE_US = 8000

# Frames grabbed and discarded on startup to let camera exposure stabilise
CAMERA_WARMUP_FRAMES = 5

# Seconds to wait between camera grab retries
CAMERA_RETRY_DELAY = 0.2

# Maximum grab retries before raising a camera error
CAMERA_RETRIES = 2

# Reconnect attempts before giving up on a lost camera
RECONNECT_ATTEMPTS = 3

# Seconds to wait between reconnect attempts
RECONNECT_DELAY_S = 5.0

# Milliseconds to wait before the second inspection attempt when the first fails
RETRY_DELAY_MS = 10

# Classifier warm-up passes on startup (separate from camera warm-up)
WARMUP_FRAMES = 5


# ─── Lighting ────────────────────────────────────────────────────────────────
# (LIGHTING_TEST → see Simple Setup above)
# true = drive serial lighting controller; false = skip entirely
LIGHTING_ENABLE = true

# Partial string to match in /dev/serial/by-id/ to identify lighting adapter
# Set to "" to fall back to LIGHTING_PORT
LIGHTING_USB_ID = "Prolific_Technology_Inc._USB-Serial_Controller"

# Static fallback port when LIGHTING_USB_ID is blank or not matched
LIGHTING_PORT = "/dev/ttyUSB1"

# Brightness level 0–255 set at startup, held for the entire run
LIGHTING_VALUE = 40


# ─── GPIO Pins (BCM numbering) ───────────────────────────────────────────────
# IN — active HIGH 10 ms pulse — machine signals ready for one shot
GPIO_START_PIN = 17

# OUT — HIGH during full inspection + retry
GPIO_BUSY_PIN = 23

# OUT — normally HIGH; pulses LOW 40 ms after inspection done
GPIO_END_PIN = 18

# OUT — normally HIGH (idle); LOW = both ICs pass, HIGH = any fail
GPIO_INSPEC_STAGE_PIN = 24


# ─── Logging & Annotation ────────────────────────────────────────────────────
# Maximum number of log files kept per pattern (oldest deleted automatically)
LOG_RETENTION = 365

# Cell overlay border thickness in pixels on annotated images
ANN_BORDER_PX = 1

# Warn in UI when free disk space drops below this (MB)
DISK_WARN_MB = 200
